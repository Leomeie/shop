services:
  - type: web
    name: shopease-api
    runtime: python
    plan: free
    buildCommand: pip install -r shop_api/requirements.txt && cd shop_api && DJANGO_SETTINGS_MODULE=config.settings.production python manage.py migrate --noinput && DJANGO_SETTINGS_MODULE=config.settings.production python manage.py createcachetable && DJANGO_SETTINGS_MODULE=config.settings.production python manage.py collectstatic --noinput
    startCommand: cd shop_api && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: shopease-api.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /api/v1/products/
